<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pastelería Jehú - Local</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Arial, sans-serif;
        background: #fdf6f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .card {
        background: white;
        border-radius: 14px;
        padding: 50px 44px;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        max-width: 420px;
        width: 100%;
      }
      .card h1 {
        font-size: 24px;
        color: #2a1a0e;
        margin-bottom: 8px;
      }
      .card p {
        color: #888;
        font-size: 14px;
        margin-bottom: 32px;
      }
      .btn {
        display: inline-block;
        background: #2a1a0e;
        color: white;
        padding: 14px 36px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 15px;
        transition: background 0.2s;
      }
      .btn:hover { background: #4a3020; }
      .url {
        margin-top: 18px;
        font-size: 12px;
        color: #bbb;
      }
      .instrucciones {
        margin-top: 28px;
        background: #fdf6f0;
        border-radius: 8px;
        padding: 16px;
        font-size: 13px;
        color: #666;
        text-align: left;
        line-height: 1.7;
      }
      .instrucciones strong { color: #2a1a0e; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🎂 Pastelería Jehú</h1>
      <p>Haz clic para abrir el proyecto en tu navegador</p>
      <a class="btn" href="http://localhost:3000" target="_blank">
        Abrir proyecto
      </a>
      <p class="url">http://localhost:3000</p>
      <div class="instrucciones">
        <strong>Pasos antes de abrir:</strong><br>
        1. Abre una terminal en la carpeta del proyecto<br>
        2. Ejecuta: <strong>bun install</strong> (o npm install)<br>
        3. Ejecuta: <strong>bun run dev</strong> (o npm run dev)<br>
        4. Luego haz clic en el botón de arriba
      </div>
    </div>
  </body>
</html>
